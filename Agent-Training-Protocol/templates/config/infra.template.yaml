stack_id: DOMAIN_NAME_local_training_stack
agent_id: AGENT_NAME
owner: OWNER_NAME
mode: local_first

roots:
  knowledge_repo: ./content
  registry_root: ./data/registry
  eval_reports: ./data/evals/DOMAIN_NAME
  runtime_workspace: ./runtime/workspace
  backups_root: ./backups

services:
  runtime:
    adapter: hermes
    mode: local
    healthcheck: python3 scripts/ops/health_runtime.py

  retrieval:
    provider: qmd
    mode: local
    transport: mcp_http
    endpoint: http://localhost:8181/mcp
    indexed_roots:
      - ./content
      - ./data/evals

  relational_memory:
    provider: honcho
    mode: local
    endpoint: http://localhost:8000
    workspace: DOMAIN_NAME

  episodic_memory:
    provider: session_search
    mode: local
    enabled: true

  traces:
    provider: langfuse
    mode: local_or_self_hosted
    endpoint: http://localhost:3000

model_backends:
  primary_reasoner:
    mode: local_or_api
    provider: PROVIDER_NAME
    required: true

  embeddings:
    mode: local
    provider: PROVIDER_NAME
    required: true

  reranker:
    mode: local
    provider: PROVIDER_NAME
    required: false

  summarizer:
    mode: local_or_api
    provider: PROVIDER_NAME
    required: false

  eval_judge:
    mode: local_or_api
    provider: PROVIDER_NAME
    required: false

mutation_surface:
  allowed:
    - prompts
    - skills
    - memory_summaries
    - retrieval_hints
    - tool_routing_hints
  blocked:
    - canon
    - policy
    - approval_matrix
    - source_rules

job_files:
  schedules: ./templates/config/schedules.template.yaml
  watcher: ./templates/config/watcher.template.yaml
