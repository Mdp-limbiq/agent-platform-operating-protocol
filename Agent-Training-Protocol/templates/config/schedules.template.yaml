timezone: America/Argentina/Buenos_Aires
executor: cron

jobs:
  - id: health_watch
    cron: "*/5 * * * *"
    command: python3 scripts/ops/watchdog.py --mode health
    purpose: Detect service failures, stale dependencies, and repairable incidents.
    needs_llm: false

  - id: session_consolidation
    cron: "7 * * * *"
    command: python3 scripts/ops/consolidate_sessions.py
    purpose: Turn new sessions into episodic and relational memory candidates.
    needs_llm: true

  - id: index_sync
    cron: "17 */6 * * *"
    command: python3 scripts/ops/sync_index.py
    purpose: Sync approved content changes into retrieval indexes.
    needs_llm: optional

  - id: freshness_audit
    cron: "30 2 * * *"
    command: python3 scripts/ops/freshness_audit.py
    purpose: Flag domains or sources that need re-verification.
    needs_llm: false

  - id: smoke_eval
    cron: "0 3 * * *"
    command: python3 scripts/run_eval.py --suite smoke
    purpose: Check basic answer quality and safety after recent changes.
    needs_llm: true

  - id: targeted_regression
    cron: "30 3 * * *"
    command: python3 scripts/run_eval.py --suite regression_minimum
    purpose: Catch regressions in the most important core suites.
    needs_llm: true

  - id: full_regression
    cron: "0 4 * * 1"
    command: python3 scripts/run_eval.py --suite weekly_full
    purpose: Run the broader benchmark and compare with the baseline.
    needs_llm: true

  - id: promotion_digest
    cron: "30 4 * * 1"
    command: python3 scripts/ops/build_promotion_digest.py
    purpose: Prepare a weekly review packet for promotions and hardening.
    needs_llm: optional

  - id: backup_snapshot
    cron: "0 2 * * *"
    command: python3 scripts/ops/backup_snapshot.py
    purpose: Snapshot knowledge, reports, runtime workspace, and exported memory.
    needs_llm: false

  - id: restore_drill
    cron: "0 6 1 * *"
    command: python3 scripts/ops/restore_drill.py
    purpose: Validate that the backup bundle can be restored correctly.
    needs_llm: false
