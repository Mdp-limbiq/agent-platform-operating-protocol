watcher:
  name: local_training_watcher
  poll_interval_seconds: 300
  max_auto_retries: 2
  degraded_mode_on_failed_repair: true

signals:
  service_health:
    - runtime
    - retrieval
    - relational_memory
    - trace_store

  freshness:
    - source_windows
    - index_lag
    - missing_embeddings

  quality:
    - eval_failures
    - regression_spikes
    - tool_error_bursts

  resources:
    - disk_pressure
    - backup_age
    - log_growth

incident_families:
  - service_down
  - index_drift
  - job_failure
  - runtime_regression
  - backup_risk

allowlisted_repairs:
  - restart_service
  - retry_idempotent_job
  - sync_index
  - reembed_changed
  - cleanup_cache
  - rollback_workspace
  - enable_degraded_mode

forbidden_repairs:
  - edit_canon
  - edit_policy
  - promote_knowledge
  - delete_primary_data
  - apply_unreviewed_major_prompt_change

llm_usage:
  required_for: []
  optional_for:
    - incident_summary
    - failure_clustering
    - patch_draft

verification:
  require_post_repair_healthcheck: true
  require_incident_log_write: true
  escalate_on_repeat_failures: true
