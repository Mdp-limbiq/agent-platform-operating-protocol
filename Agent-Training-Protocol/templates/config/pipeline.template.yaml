pipeline_id: DOMAIN_NAME_pipeline
domain: DOMAIN_NAME
owner: OWNER_NAME

roots:
  knowledge_root: ./content
  registry_root: ./data/registry
  reports_root: ./data/evals/DOMAIN_NAME
  runtime_workspace: ./runtime/workspace

benchmark:
  minimum_suite: regression_minimum
  smoke_suite: smoke
  applied_suite: applied_scenarios

gating:
  require_no_failures: true
  allow_soft_pass_for_learning_stage: true
  promotion_requires_manual_review: true

evolution:
  enabled: false
  mutable_layers:
    - prompts
    - skills
    - memory
  immutable_layers:
    - canon
    - policy
    - approval_matrix

runtime:
  runner_command: python3 scripts/run_eval.py
  answer_extractor: custom
  report_formats:
    - json
    - md

